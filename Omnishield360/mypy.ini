[mypy]
python_version = 3.11
strict = True
warn_unused_ignores = True
show_error_codes = True
pretty = True
files = src/agents/pii_masker.py, src/agents/streaming.py, src/case_management, src/observability, src/workflows/schemas.py, src/workflows/routing.py

[mypy-uipath.*]
ignore_missing_imports = True
